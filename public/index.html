<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Operator — Dashboard</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --panel-2: #1f232c;
        --border: #2a2f3a;
        --text: #e6e8ec;
        --muted: #9aa3b2;
        --accent: #4f8cff;
        --fast: #f5a623;
        --passive: #57c785;
        --danger: #ff5c5c;
        --radius: 12px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 22px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(15, 17, 21, 0.9);
        backdrop-filter: blur(8px);
        z-index: 10;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
      header .sun { color: var(--fast); }
      main { max-width: 1100px; margin: 0 auto; padding: 22px; }
      h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 28px 0 12px; }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        padding: 8px 14px;
        border-radius: 8px;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { border-color: var(--accent); }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.danger { color: var(--danger); }
      button.danger:hover { border-color: var(--danger); }
      input, select, textarea {
        font: inherit;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
      }
      textarea { resize: vertical; min-height: 48px; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .card.fast { border-top: 3px solid var(--fast); }
      .card.passive { border-top: 3px solid var(--passive); }
      .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
      .pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
      .field { margin-bottom: 10px; }
      .card-actions { display: flex; gap: 8px; margin-top: 12px; }
      .card-actions .spacer { flex: 1; }
      .score { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
      .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .goal { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
      #login { max-width: 360px; margin: 12vh auto; }
      #login .card { text-align: center; }
      .toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--panel-2); border: 1px solid var(--border); padding: 10px 18px;
        border-radius: 10px; opacity: 0; transition: opacity 0.25s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .toast.err { border-color: var(--danger); color: var(--danger); }
      .hidden { display: none !important; }
      .muted { color: var(--muted); }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="login" class="hidden">
      <div class="card">
        <h1><span class="sun">☀️</span> Operator</h1>
        <p class="muted">Enter the dashboard password.</p>
        <div class="field"><input id="login-pw" type="password" placeholder="Password" autocomplete="current-password" /></div>
        <button class="primary" style="width:100%" onclick="doLogin()">Unlock</button>
        <p id="login-err" class="muted" style="color:var(--danger);min-height:18px"></p>
      </div>
    </div>

    <div id="app" class="hidden">
      <header>
        <h1><span class="sun">☀️</span> Operator <span class="muted" style="font-weight:400">dashboard</span></h1>
        <button onclick="logout()">Log out</button>
      </header>
      <main>
        <div class="toolbar">
          <h2 style="margin:0">Goals</h2>
          <button onclick="addGoal()">+ Add goal</button>
        </div>
        <div id="goals"></div>

        <div class="toolbar">
          <h2 style="margin:0">Projects</h2>
          <button class="primary" onclick="addProject()">+ Add project</button>
        </div>
        <div id="projects" class="grid"></div>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const PW_KEY = "operator_dashboard_pw";
      let pw = localStorage.getItem(PW_KEY) || "";

      const $ = (id) => document.getElementById(id);

      function toast(msg, isErr) {
        const t = $("toast");
        t.textContent = msg;
        t.className = "toast show" + (isErr ? " err" : "");
        setTimeout(() => (t.className = "toast"), 2200);
      }

      async function api(method, path, body) {
        const res = await fetch("/api" + path, {
          method,
          headers: {
            "content-type": "application/json",
            "x-dashboard-password": pw,
          },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (res.status === 401) {
          logout();
          throw new Error("Unauthorized");
        }
        const data = res.headers.get("content-type")?.includes("json") ? await res.json() : null;
        if (!res.ok) throw new Error((data && data.error) || res.statusText);
        return data;
      }

      const STATUSES = ["idea", "active", "blocked", "shipped", "paid", "archived"];
      const TYPES = ["fast", "passive"];

      function scoreOf(p) {
        const speed = 6 - Number(p.time_to_cash);
        const s = (Number(p.revenue_potential) * Number(p.confidence) * speed) / Math.max(Number(p.effort_remaining), 1);
        return Math.round(s * 10) / 10;
      }

      function esc(s) {
        return (s ?? "").toString().replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      function selectOpts(options, selected) {
        return options.map((o) => `<option value="${o}" ${o === selected ? "selected" : ""}>${o}</option>`).join("");
      }

      function projectCard(p) {
        const isNew = !p.id;
        return `
        <div class="card ${esc(p.type || "fast")}" data-id="${p.id || ""}">
          <div class="card-head">
            <span class="pill">${p.id ? "#" + p.id : "new"}</span>
            <span class="score" title="priority score">${p.id || p.name ? "score " + scoreOf(p) : ""}</span>
          </div>
          <div class="field"><label>Name</label><input data-k="name" value="${esc(p.name)}" /></div>
          <div class="row">
            <div class="field"><label>Type</label><select data-k="type">${selectOpts(TYPES, p.type || "fast")}</select></div>
            <div class="field"><label>Status</label><select data-k="status">${selectOpts(STATUSES, p.status || "active")}</select></div>
          </div>
          <div class="field"><label>Client</label><input data-k="client" value="${esc(p.client)}" /></div>
          <div class="row-3">
            <div class="field"><label>Revenue 1-5</label><input data-k="revenue_potential" type="number" min="1" max="5" value="${esc(p.revenue_potential ?? 3)}" /></div>
            <div class="field"><label>Confidence 1-5</label><input data-k="confidence" type="number" min="1" max="5" value="${esc(p.confidence ?? 3)}" /></div>
            <div class="field"><label>Time→cash 1-5</label><input data-k="time_to_cash" type="number" min="1" max="5" value="${esc(p.time_to_cash ?? 3)}" /></div>
          </div>
          <div class="row">
            <div class="field"><label>Effort (hrs left)</label><input data-k="effort_remaining" type="number" min="0" value="${esc(p.effort_remaining ?? 8)}" /></div>
            <div class="field"><label>Deadline</label><input data-k="deadline" type="date" value="${esc(p.deadline)}" /></div>
          </div>
          <div class="field"><label>Next action</label><textarea data-k="next_action">${esc(p.next_action)}</textarea></div>
          <div class="field"><label>Notes</label><textarea data-k="notes">${esc(p.notes)}</textarea></div>
          <div class="card-actions">
            <button class="primary" onclick="saveProject(this)">${isNew ? "Create" : "Save"}</button>
            <span class="spacer"></span>
            <button class="danger" onclick="${isNew ? "removeNewCard(this)" : "deleteProject(this)"}">${isNew ? "Discard" : "Delete"}</button>
          </div>
        </div>`;
      }

      function collectCard(cardEl) {
        const out = {};
        cardEl.querySelectorAll("[data-k]").forEach((el) => {
          out[el.dataset.k] = el.value;
        });
        return out;
      }

      async function loadProjects() {
        const list = await api("GET", "/projects");
        $("projects").innerHTML = list.map(projectCard).join("");
      }

      function addProject() {
        const wrap = document.createElement("div");
        wrap.innerHTML = projectCard({ type: "fast", status: "active" });
        $("projects").prepend(wrap.firstElementChild);
      }

      function removeNewCard(btn) { btn.closest(".card").remove(); }

      async function saveProject(btn) {
        const card = btn.closest(".card");
        const id = card.dataset.id;
        const body = collectCard(card);
        try {
          if (id) {
            await api("PATCH", "/projects/" + id, body);
          } else {
            await api("POST", "/projects", body);
          }
          toast("Saved");
          await loadProjects();
        } catch (e) {
          toast(e.message, true);
        }
      }

      async function deleteProject(btn) {
        const card = btn.closest(".card");
        if (!confirm("Delete project #" + card.dataset.id + "?")) return;
        try {
          await api("DELETE", "/projects/" + card.dataset.id);
          toast("Deleted");
          card.remove();
        } catch (e) {
          toast(e.message, true);
        }
      }

      function goalCard(g) {
        const isNew = !g.id;
        return `
        <div class="goal" data-id="${g.id || ""}">
          <div class="field"><label>Goal${g.id ? " #" + g.id : ""}</label><input data-k="title" value="${esc(g.title)}" placeholder="What are you aiming for?" /></div>
          <div class="field"><label>Detail</label><textarea data-k="detail">${esc(g.detail)}</textarea></div>
          <div class="card-actions">
            <button class="primary" onclick="saveGoal(this)">${isNew ? "Create" : "Save"}</button>
            <span class="spacer"></span>
            <button class="danger" onclick="${isNew ? "removeNewCard2(this)" : "deleteGoal(this)"}">${isNew ? "Discard" : "Delete"}</button>
          </div>
        </div>`;
      }

      function removeNewCard2(btn) { btn.closest(".goal").remove(); }

      async function loadGoals() {
        const list = await api("GET", "/goals");
        $("goals").innerHTML = list.map(goalCard).join("");
      }

      function addGoal() {
        const wrap = document.createElement("div");
        wrap.innerHTML = goalCard({});
        $("goals").prepend(wrap.firstElementChild);
      }

      async function saveGoal(btn) {
        const el = btn.closest(".goal");
        const id = el.dataset.id;
        const body = { title: el.querySelector('[data-k="title"]').value, detail: el.querySelector('[data-k="detail"]').value };
        try {
          if (id) await api("PATCH", "/goals/" + id, body);
          else await api("POST", "/goals", body);
          toast("Saved");
          await loadGoals();
        } catch (e) {
          toast(e.message, true);
        }
      }

      async function deleteGoal(btn) {
        const el = btn.closest(".goal");
        if (!confirm("Delete this goal?")) return;
        try {
          await api("DELETE", "/goals/" + el.dataset.id);
          toast("Deleted");
          el.remove();
        } catch (e) {
          toast(e.message, true);
        }
      }

      function showApp() {
        $("login").classList.add("hidden");
        $("app").classList.remove("hidden");
        Promise.all([loadGoals(), loadProjects()]).catch((e) => toast(e.message, true));
      }

      function showLogin() {
        $("app").classList.add("hidden");
        $("login").classList.remove("hidden");
        $("login-pw").focus();
      }

      function logout() {
        pw = "";
        localStorage.removeItem(PW_KEY);
        showLogin();
      }

      async function doLogin() {
        pw = $("login-pw").value;
        try {
          await api("GET", "/session");
          localStorage.setItem(PW_KEY, pw);
          $("login-err").textContent = "";
          showApp();
        } catch (e) {
          pw = "";
          $("login-err").textContent = "Wrong password.";
        }
      }

      $("login-pw")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

      // Boot: try the stored password, else show login.
      (async function () {
        if (pw) {
          try {
            await api("GET", "/session");
            showApp();
            return;
          } catch (_) { /* fall through */ }
        }
        showLogin();
      })();
    </script>
  </body>
</html>
